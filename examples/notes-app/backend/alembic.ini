; Alembic configuration for notes-app's persistent state.
; Default URL points at a local sqlite file in the backend's cwd.
; Override on the CLI with: alembic -x dburl=... upgrade head
; Or via NOTES_APP_DATABASE_URL — env.py prefers it over this default.

[alembic]
script_location = %(here)s/src/notes_app/alembic
sqlalchemy.url = sqlite+aiosqlite:///./notes-app.sqlite
prepend_sys_path = .
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
